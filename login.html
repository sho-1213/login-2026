<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログインページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .message {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>ログイン</h2>
    <input type="password" id="password" placeholder="パスワードを入力">
    <button onclick="login()">ログイン</button>
    <p class="message" id="message"></p>
</div>

<script>
    const correctPassword = "1213";

    function login() {
        const password = document.getElementById("password").value;
        const message = document.getElementById("message");

        if (password === correctPassword) {
            message.style.color = "green";
            message.textContent = "ログイン成功！";

            setTimeout(() => {
                window.location.href = "https://sho-1213.github.io/sho/";
            }, 1000);

        } else {
            message.style.color = "red";
            message.textContent = "パスワードが違います";
        }
    }
</script>

</body>
</html>
