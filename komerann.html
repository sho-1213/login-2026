<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コメント欄</title>

<style>
body{
    font-family:sans-serif;
    max-width:600px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.comment-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.comment{
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.time{
    color:gray;
    font-size:12px;
    margin-top:5px;
}
</style>
</head>
<body>

<h1>コメント欄</h1>

<div class="comment-box">
    <input type="text" id="commentInput" placeholder="コメントを入力">
    <button id="sendBtn">投稿</button>
</div>

<div id="commentList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2pgwancSItJVet0-Q5drvH4RyCWudeSw",
  authDomain: "komenntorann-333d6.firebaseapp.com",
  projectId: "komenntorann-333d6",
  storageBucket: "komenntorann-333d6.firebasestorage.app",
  messagingSenderId: "591752593726",
  appId: "1:591752593726:web:a2abe3d03db10f8a36ec6f",
  measurementId: "G-NN1JLQ49K8"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const commentInput = document.getElementById("commentInput");
const sendBtn = document.getElementById("sendBtn");
const commentList = document.getElementById("commentList");

sendBtn.addEventListener("click", async () => {

    const text = commentInput.value.trim();

    if(text === ""){
        alert("コメントを入力してください");
        return;
    }

    try{

        await addDoc(collection(db,"comments"),{
            text:text,
            createdAt:serverTimestamp()
        });

        commentInput.value="";

    }catch(error){

        console.error(error);
        alert("投稿に失敗しました");

    }

});

const q = query(
    collection(db,"comments"),
    orderBy("createdAt","desc")
);

onSnapshot(q,(snapshot)=>{

    commentList.innerHTML="";

    snapshot.forEach((doc)=>{

        const data = doc.data();

        const div = document.createElement("div");
        div.className="comment";

        let dateText = "";

        if(data.createdAt){
            dateText =
            data.createdAt
            .toDate()
            .toLocaleString("ja-JP");
        }

        div.innerHTML = `
            <div>${data.text}</div>
            <div class="time">${dateText}</div>
        `;

        commentList.appendChild(div);

    });

});

</script>

</body>
</html>
